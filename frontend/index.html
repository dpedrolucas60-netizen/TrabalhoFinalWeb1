<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futebol Brasil</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>TUDO SOBRE FUTEBOL</h1>
        <p>Selecione um campeonato para ver os times</p>
    </header>

    <main>

        <section>
            <h2>Campeonatos</h2>

            <div id="campeonatos" class="container-cards">
                <p>Carregando campeonatos...</p>
            </div>
        </section>

        <section>
            <h2 id="titulo-times">
                Times do Campeonato
            </h2>

            <div id="times" class="container-cards">
                <p>Clique em um campeonato acima.</p>
            </div>
        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
